services:
  metrology-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # 持久化模型 checkpoints，避免每次重建都重新下載
      - model-cache:/app/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G   # SAM + Mask R-CNN + HRNet 約需 4-6GB

volumes:
  model-cache:
